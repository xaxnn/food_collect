<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>暂未收录</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:微软雅黑;}
        body{background:#f8f5f0;padding:40px 20px;text-align:center;}
        .box{max-width:600px;margin:0 auto;background:white;padding:40px;border-radius:12px;box-shadow:0 3px 10px #0000001a;}
        h1{color:#d64541;margin-bottom:20px;}
        p{font-size:18px;color:#666;line-height:1.8;}
        a{display:inline-block;margin-top:20px;padding:10px 20px;background:#d64541;color:white;text-decoration:none;border-radius:8px;}
    </style>
</head>
<body>
<div class="box">
    <h1>暂未收录该美食</h1>
    <p id="tip"></p>
    <a href="index.html">返回首页重新搜索</a>
</div>
<script>
    const params = new URLSearchParams(location.search);
    const food = decodeURIComponent(params.get('food')||'');
    document.getElementById('tip').innerText = `抱歉，暂未收录美食：“${food}”`;
</script>
</body>
</html>
