<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>舌尖上的中国 - 用户注册</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "微软雅黑", sans-serif;
        }

        body {
            background-color: #f8f5f0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .register-box {
            background-color: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
        }

        .title {
            color: #d64541;
            text-align: center;
            margin-bottom: 30px;
            font-size: 24px;
        }

        .input-group {
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-size: 14px;
        }

        .input-group input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #eee;
            border-radius: 5px;
            font-size: 16px;
            outline: none;
        }

        .input-group input:focus {
            border-color: #d64541;
        }

        .btn {
            width: 100%;
            padding: 12px;
            background-color: #d64541;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        .btn:hover {
            background-color: #b93834;
        }

        .link {
            text-align: center;
            margin-top: 20px;
        }

        .link a {
            color: #d64541;
            text-decoration: none;
        }

        .link a:hover {
            text-decoration: underline;
        }

        .error-tip {
            color: #d64541;
            text-align: center;
            margin-bottom: 15px;
            display: none;
        }

        .success-tip {
            color: #28a745;
            text-align: center;
            margin-bottom: 15px;
            display: none;
        }
    </style>
</head>
<body>
    <div class="register-box">
        <h2 class="title">用户注册</h2>
        <div class="error-tip" id="errorTip"></div>
        <div class="success-tip" id="successTip"></div>
        
        <div class="input-group">
            <label for="username">用户名</label>
            <input type="text" id="username" placeholder="请输入用户名（3-10位）">
        </div>
        
        <div class="input-group">
            <label for="password">密码</label>
            <input type="password" id="password" placeholder="请输入密码（6-16位）">
        </div>
        
        <div class="input-group">
            <label for="repassword">确认密码</label>
            <input type="password" id="repassword" placeholder="请再次输入密码">
        </div>
        
        <button class="btn" id="registerBtn">注册</button>
        
        <div class="link">
            已有账号？<a href="login.html">立即登录</a>
            <br>
            <a href="index.html">返回首页</a>
        </div>
    </div>

    <script>
        // 获取DOM元素
        const usernameInput = document.getElementById('username');
        const passwordInput = document.getElementById('password');
        const repasswordInput = document.getElementById('repassword');
        const registerBtn = document.getElementById('registerBtn');
        const errorTip = document.getElementById('errorTip');
        const successTip = document.getElementById('successTip');

        // 注册功能
        registerBtn.addEventListener('click', function() {
            const username = usernameInput.value.trim();
            const password = passwordInput.value.trim();
            const repassword = repasswordInput.value.trim();

            // 验证输入
            if (!username || !password || !repassword) {
                errorTip.textContent = '所有字段不能为空！';
                errorTip.style.display = 'block';
                successTip.style.display = 'none';
                return;
            }

            if (username.length < 3 || username.length > 10) {
                errorTip.textContent = '用户名长度需在3-10位之间！';
                errorTip.style.display = 'block';
                successTip.style.display = 'none';
                return;
            }

            if (password.length < 6 || password.length > 16) {
                errorTip.textContent = '密码长度需在6-16位之间！';
                errorTip.style.display = 'block';
                successTip.style.display = 'none';
                return;
            }

            if (password !== repassword) {
                errorTip.textContent = '两次输入的密码不一致！';
                errorTip.style.display = 'block';
                successTip.style.display = 'none';
                return;
            }

            // 从本地存储获取用户数据
            const users = JSON.parse(localStorage.getItem('foodUsers') || '[]');
            
            // 检查用户名是否已存在
            if (users.some(u => u.username === username)) {
                errorTip.textContent = '用户名已存在！';
                errorTip.style.display = 'block';
                successTip.style.display = 'none';
                return;
            }

            // 注册成功，保存用户数据
            users.push({
                username: username,
                password: password,
                registerTime: new Date().getTime()
            });
            localStorage.setItem('foodUsers', JSON.stringify(users));

            successTip.textContent = '注册成功！正在跳转登录页...';
            successTip.style.display = 'block';
            errorTip.style.display = 'none';
            
            // 跳转到登录页
            setTimeout(() => {
                window.location.href = 'login.html';
            }, 1500);
        });

        // 回车注册
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                registerBtn.click();
            }
        });
    </script>
</body>
</html>
