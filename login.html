<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>舌尖上的中国 - 用户登录</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "微软雅黑", sans-serif;
        }

        body {
            background-color: #f8f5f0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .login-box {
            background-color: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
        }

        .title {
            color: #d64541;
            text-align: center;
            margin-bottom: 30px;
            font-size: 24px;
        }

        .input-group {
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-size: 14px;
        }

        .input-group input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #eee;
            border-radius: 5px;
            font-size: 16px;
            outline: none;
        }

        .input-group input:focus {
            border-color: #d64541;
        }

        .btn {
            width: 100%;
            padding: 12px;
            background-color: #d64541;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        .btn:hover {
            background-color: #b93834;
        }

        .link {
            text-align: center;
            margin-top: 20px;
        }

        .link a {
            color: #d64541;
            text-decoration: none;
        }

        .link a:hover {
            text-decoration: underline;
        }

        .error-tip {
            color: #d64541;
            text-align: center;
            margin-bottom: 15px;
            display: none;
        }

        .success-tip {
            color: #28a745;
            text-align: center;
            margin-bottom: 15px;
            display: none;
        }
    </style>
</head>
<body>
    <div class="login-box">
        <h2 class="title">用户登录</h2>
        <div class="error-tip" id="errorTip"></div>
        <div class="success-tip" id="successTip"></div>
        
        <div class="input-group">
            <label for="username">用户名</label>
            <input type="text" id="username" placeholder="请输入用户名">
        </div>
        
        <div class="input-group">
            <label for="password">密码</label>
            <input type="password" id="password" placeholder="请输入密码">
        </div>
        
        <button class="btn" id="loginBtn">登录</button>
        
        <div class="link">
            还没有账号？<a href="register.html">立即注册</a>
            <br>
            <a href="index.html">返回首页</a>
        </div>
    </div>

    <script>
        const usernameInput = document.getElementById('username');
        const passwordInput = document.getElementById('password');
        const loginBtn = document.getElementById('loginBtn');
        const errorTip = document.getElementById('errorTip');
        const successTip = document.getElementById('successTip');

        loginBtn.addEventListener('click', function() {
            const username = usernameInput.value.trim();
            const password = passwordInput.value.trim();

            if (!username || !password) {
                errorTip.textContent = '用户名和密码不能为空！';
                errorTip.style.display = 'block';
                successTip.style.display = 'none';
                return;
            }

            const users = JSON.parse(localStorage.getItem('foodUsers') || '[]');
            const user = users.find(u => u.username === username && u.password === password);

            if (user) {
                localStorage.setItem('currentUser', JSON.stringify({
                    username: user.username,
                    loginTime: new Date().getTime()
                }));
                
                successTip.textContent = '登录成功！正在跳转首页...';
                successTip.style.display = 'block';
                errorTip.style.display = 'none';

                // ========== 这里修复跳转 ==========
                setTimeout(() => {
                    window.location.replace("index.html");
                }, 600);
                
            } else {
                errorTip.textContent = '用户名或密码错误！';
                errorTip.style.display = 'block';
                successTip.style.display = 'none';
            }
        });

        document.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                loginBtn.click();
            }
        });
    </script>
</body>
</html>
