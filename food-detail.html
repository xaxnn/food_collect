        const { province, index } = getUrlParams();
        const foodDetailContainer = document.getElementById('food-detail');

        function renderFoodDetail() {
            if (!foodData[province] || !foodData[province][index]) {
                foodDetailContainer.innerHTML = `<p style="color:#d64541; text-align:center; font-size:18px;">暂无该美食的详细信息</p>`;
                return;
            }

            const food = foodData[province][index];
            foodDetailContainer.innerHTML = `
                <img src="${food.img}" alt="${food.name}" class="food-img-big">
                <h2 class="food-name">${food.name}</h2>
                <p class="food-detail-desc">${food.detail}</p>
            `;
        }

        renderFoodDetail();
    </script>
